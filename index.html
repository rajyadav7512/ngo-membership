<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LNHKS NGO Management System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">
<img src="logo.png" class="logo" alt="Logo">

<div>
<h1>लक्ष्मी नारायण हरिकृपा सेवा संस्थान</h1>
<p>NGO Management System</p>
</div>
</div>

<div class="menu">

<div class="card">
<h2>👤 Membership</h2>
<p>नया सदस्य जोड़ें और रसीद बनाएँ</p>
<button>Open</button>
</div>

<div class="card">
<h2>❤️ Donation</h2>
<p>दान रसीद बनाएँ</p>
<button>Open</button>
</div>

<div class="card">
<h2>👥 Members</h2>
<p>सभी सदस्यों की सूची</p>
<button>Open</button>
</div>

<div class="card">
<h2>🙏 Donors</h2>
<p>सभी दानदाताओं की सूची</p>
<button>Open</button>
</div>

<div class="card">
<h2>📊 Reports</h2>
<p>Income और Reports</p>
<button>Open</button>
</div>

<div class="card">
<h2>⚙️ Settings</h2>
<p>NGO Settings</p>
<button>Open</button>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
