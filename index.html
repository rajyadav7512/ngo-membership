 <!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NGO Membership System</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="header">

<img src="logo.png" class="logo">

<div>

<h1>लक्ष्मी नारायण हरिकृपा सेवा संस्थान</h1>

<p>Membership Management System</p>

</div>

</div>

<hr>

<h2>नया सदस्य जोड़ें</h2>

<form id="memberForm">

<label>सदस्य का नाम</label>

<input
type="text"
id="name"
required>

<label>मोबाइल नंबर</label>

<input
type="tel"
id="mobile"
required>

<label>पता</label>

<textarea id="address"></textarea>

<label>सदस्यता राशि</label>

<select id="amount">

<option>1101</option>

<option>2100</option>

<option>5100</option>

</select>

<button type="submit">

रसीद बनाएँ

</button>

</form>

</div>

<script src="script.js"></script>

</body>

</html>
